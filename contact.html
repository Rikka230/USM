<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USM Football | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-nav">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Eagle_white_icon.svg/1024px-Eagle_white_icon.svg.png" alt="Aigle">
                <div>USM F<span>OO</span>TBALL</div>
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html#agence" data-i18n="nav_agency">L'Agence</a>
            <a href="index.html#services" data-i18n="nav_services">Services</a>
            <a href="index.html#joueurs" data-i18n="nav_talents">Les Talents</a>
            
            <div class="lang-switcher">
                <select id="lang-select" aria-label="Changer de langue">
                    <option value="fr">FR</option>
                    <option value="en">EN</option>
                    <option value="es">ES</option>
                    <option value="pt">PT</option>
                </select>
            </div>
            <a href="contact.html" style="text-decoration: none;"><button class="btn-premium" data-i18n="nav_button">Contact</button></a>
        </nav>
    </header>

    <section class="hero-massive" style="min-height: 40vh; padding-top: 150px; padding-bottom: 20px;">
        <h1 class="reveal" data-i18n="contact_title" style="font-size: clamp(2rem, 5vw, 4rem);">Contact</h1>
        <p class="reveal pink-accent" data-i18n="contact_subtitle">Discutons de votre avenir.</p>
    </section>

    <main class="contact-section">
        <div class="contact-grid">
            
            <div class="bento-card reveal contact-info">
                <h2 data-i18n="contact_info_title" style="margin-bottom: 20px;">Nos Coordonnées</h2>
                
                <div class="contact-info-item">
                    <h3 data-i18n="contact_hq">Siège Social</h3>
                    <p data-i18n="contact_hq_val">Marseille, France</p>
                </div>
                
                <div class="contact-info-item">
                    <h3 data-i18n="contact_phone">Téléphone</h3>
                    <p data-i18n="contact_phone_val">+33 (0)4 XX XX XX XX</p>
                </div>
                
                <div class="contact-info-item">
                    <h3 data-i18n="contact_email">Email</h3>
                    <p data-i18n="contact_email_val">contact@usm-football.com</p>
                </div>
            </div>

            <div class="bento-card reveal contact-form-box">
                <h2 data-i18n="contact_form_title">Envoyer un message</h2>
                <form class="public-form">
                    <input type="text" data-i18n-placeholder="contact_ph_name" placeholder="Votre nom complet" required>
                    <input type="email" data-i18n-placeholder="contact_ph_email" placeholder="Votre adresse email" required>
                    <select required>
                        <option value="joueur" data-i18n="contact_opt_player">Je suis un joueur</option>
                        <option value="club" data-i18n="contact_opt_club">Je représente un club</option>
                        <option value="autre" data-i18n="contact_opt_other">Autre demande</option>
                    </select>
                    <textarea rows="5" data-i18n-placeholder="contact_ph_msg" placeholder="Votre message..." required></textarea>
                    <button type="submit" class="btn-premium" data-i18n="contact_btn_send" style="width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 8px;">Envoyer le message</button>
                </form>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <a href="#mentions-legales" class="legal-link" data-i18n="legal_mentions">Mentions Légales</a>
            <span class="footer-separator">•</span>
            <p class="copyright">&copy; 2026. USM Football.</p>
            <span class="footer-separator">•</span>
            <p class="powered-by">Powered by <a href="admin.html" class="admin-secret-link">NOCX WEB</a></p>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
