<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USM Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

    <div id="auth-loader" class="fullscreen-loader">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Eagle_white_icon.svg/1024px-Eagle_white_icon.svg.png" alt="USM" width="60" class="pulse-anim">
    </div>

    <div id="login-screen" class="hidden">
        <form id="login-form">
            <h2>USM SYSTEM</h2>
            <input type="email" id="admin-email" placeholder="Email" required>
            <input type="password" id="admin-pwd" placeholder="Mot de passe" required>
            <button type="submit">Connexion</button>
        </form>
    </div>

    <div id="dashboard" class="hidden">
        <aside class="sidebar">
            <h2 class="pink-accent">USM Admin</h2>
            <nav>
                <button id="nav-add" class="active">Nouveau Joueur</button>
                <button id="nav-manage">Gérer le Roster</button>
                <button id="logout-btn" class="danger" style="margin-top: 50px;">Déconnexion</button>
            </nav>
        </aside>

        <main class="admin-content">
            
            <section id="add-player-section">
                <header><h1>Ajouter au Roster</h1></header>
                <form id="content-form" class="bento-form">
                    <input type="text" id="player-name" placeholder="Nom du Joueur" required>
                    <input type="text" id="player-stat" placeholder="Statistique (ex: 150 Sélections)">
                    <input type="url" id="player-tm" placeholder="Lien Transfermarkt (Optionnel)">
                    
                    <select id="player-category">
                        <option value="gardien">Gardien</option>
                        <option value="defenseur">Défenseur</option>
                        <option value="milieu">Milieu</option>
                        <option value="attaquant">Attaquant</option>
                        <option value="feminine">Féminine</option>
                        <option value="coach">Coach & Staff</option>
                    </select>
                    
                    <div id="drop-zone" class="drop-zone">
                        <p>Glissez la photo du joueur ici</p>
                        <input type="file" id="media-upload" accept="image/*" hidden>
                    </div>
                    <button type="submit" id="publish-btn" class="btn-publish">Publier (Ordre Auto)</button>
                </form>
            </section>

            <section id="manage-players-section" class="hidden">
                <header style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
                    <div>
                        <h1>Gérer le Roster</h1>
                        <p style="color: #aaa;">Classement par ordre d'apparition sur le site.</p>
                    </div>
                    <input type="text" id="search-bar" placeholder="🔍 Rechercher un nom..." style="padding:10px 15px; border-radius:8px; border:1px solid #444; background:#1e1e1e; color:#fff;">
                </header>

                <div class="admin-tabs" style="display:flex; gap:10px; margin-bottom: 20px;">
                    <button class="admin-tab active" data-cat="gardien">Gardiens</button>
                    <button class="admin-tab" data-cat="defenseur">Défenseurs</button>
                    <button class="admin-tab" data-cat="milieu">Milieux</button>
                    <button class="admin-tab" data-cat="attaquant">Attaquants</button>
                    <button class="admin-tab" data-cat="feminine">Féminines</button>
                    <button class="admin-tab" data-cat="coach">Coachs</button>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Ordre</th>
                                <th>Photo</th>
                                <th>Nom</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-players-list">
                            </tbody>
                    </table>
                </div>
                
                <div id="pagination-controls" style="display:flex; gap:10px; margin-top:20px; justify-content:center;">
                    </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
