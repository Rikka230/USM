<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USM Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

    <div id="auth-loader" class="fullscreen-loader">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Eagle_white_icon.svg/1024px-Eagle_white_icon.svg.png" alt="USM" width="60" class="pulse-anim">
    </div>

    <div id="login-screen" class="hidden">
        <form id="login-form">
            <h2>USM SYSTEM</h2>
            <input type="email" id="admin-email" placeholder="Email" required>
            <input type="password" id="admin-pwd" placeholder="Mot de passe" required>
            <button type="submit">Connexion</button>
        </form>
    </div>

    <div id="dashboard" class="hidden">
        <aside class="sidebar">
            <h2 class="pink-accent">USM Admin</h2>
            <nav>
                <button id="nav-add" class="active">Nouveau Joueur</button>
                <button id="nav-manage">Gérer le Roster</button>
                <button id="logout-btn" class="danger" style="margin-top: 50px;">Déconnexion</button>
            </nav>
        </aside>

        <main class="admin-content">
            
            <section id="add-player-section">
                <header><h1>Ajouter au Roster</h1></header>
                <form id="content-form" class="bento-form">
                    <input type="text" id="player-name" placeholder="Nom du Joueur" required>
                    <input type="text" id="player-stat" placeholder="Statistique (ex: 150 Sélections)">
                    
                    <select id="player-category">
                        <option value="gardien">Gardien</option>
                        <option value="defenseur">Défenseur</option>
                        <option value="milieu">Milieu</option>
                        <option value="attaquant">Attaquant</option>
                        <option value="feminine">Féminine</option>
                        <option value="coach">Coach & Staff</option>
                    </select>
                    
                    <div id="drop-zone" class="drop-zone">
                        <p>Glissez la photo du joueur ici (Crop Auto 4:5 et WebP)</p>
                        <input type="file" id="media-upload" accept="image/*" hidden>
                    </div>
                    
                    <button type="submit" id="publish-btn" class="btn-publish">Publier sur le site</button>
                </form>
            </section>

            <section id="manage-players-section" class="hidden">
                <header>
                    <h1>Gérer le Roster</h1>
                    <p style="color: #aaa;">Liste de tous les joueurs publiés sur le site.</p>
                </header>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Nom</th>
                                <th>Catégorie</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-players-list">
                            </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
