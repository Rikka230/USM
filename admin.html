<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USM Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

    <div id="auth-loader" class="fullscreen-loader">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Eagle_white_icon.svg/1024px-Eagle_white_icon.svg.png" alt="USM" width="60" class="pulse-anim">
    </div>

    <div id="login-screen" class="hidden">
        <form id="login-form">
            <h2>USM SYSTEM</h2>
            <input type="email" id="admin-email" placeholder="Email" required>
            <input type="password" id="admin-pwd" placeholder="Mot de passe" required>
            <button type="submit">Connexion</button>
        </form>
    </div>

    <div id="dashboard" class="hidden">
        
        <aside class="sidebar">
            <h2 class="pink-accent">USM Admin</h2>
            <nav>
                <button id="nav-manage" class="active">Gérer le Roster</button>
                <button id="nav-settings">Paramètres du Site</button>
                
                <div style="margin-top: 50px; display: flex; flex-direction: column; gap: 10px;">
                    <a href="index.html" class="btn-return">🔙 Retour au site</a>
                    <button id="logout-btn" class="danger">Déconnexion</button>
                </div>
            </nav>
        </aside>

        <main class="admin-content">
            
            <section id="manage-players-section">
                <header style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; flex-wrap: wrap; gap: 15px;">
                    <div>
                        <h1>Gérer le Roster</h1>
                        <button id="btn-show-add-form" style="background:var(--usm-pink); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; transition:0.3s;">➕ Ajouter un profil</button>
                    </div>
                    <input type="text" id="search-bar" placeholder="🔍 Rechercher un joueur..." style="padding:12px 20px; border-radius:30px; border:1px solid #444; background:#1e1e1e; color:#fff; min-width: 250px;">
                </header>

                <div class="admin-tabs">
                    <button class="admin-tab active" data-cat="gardien">Gardiens</button>
                    <button class="admin-tab" data-cat="defenseur">Défenseurs</button>
                    <button class="admin-tab" data-cat="milieu">Milieux</button>
                    <button class="admin-tab" data-cat="attaquant">Attaquants</button>
                    <button class="admin-tab" data-cat="feminine">Féminines</button>
                    <button class="admin-tab" data-cat="coach">Coachs</button>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Ordre</th>
                                <th>Photo</th>
                                <th>Nom</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-players-list">
                            </tbody>
                    </table>
                </div>
                <div id="pagination-controls" style="display:flex; gap:10px; margin-top:20px; justify-content:center;"></div>
            </section>

            <section id="form-player-section" class="hidden">
                <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                    <h1 id="form-title">Créer un Profil</h1>
                    <button class="btn-cancel" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">❌ Annuler</button>
                </header>
                
                <form id="content-form" class="bento-form">
                    <input type="hidden" id="edit-player-id">
                    <input type="hidden" id="existing-image-url">
                    
                    <input type="text" id="player-name" placeholder="Nom du Joueur" required>
                    <input type="text" id="player-stat" placeholder="Statistique (ex: 150 Sélections)">
                    <input type="url" id="player-tm" placeholder="Lien Transfermarkt (Optionnel)">
                    
                    <select id="player-category">
                        <option value="gardien">Gardien</option>
                        <option value="defenseur">Défenseur</option>
                        <option value="milieu">Milieu</option>
                        <option value="attaquant">Attaquant</option>
                        <option value="feminine">Féminine</option>
                        <option value="coach">Coach & Staff</option>
                    </select>
                    
                    <div id="drop-zone" class="drop-zone">
                        <p>Glissez une photo ici (laissez vide pour conserver l'actuelle)</p>
                        <input type="file" id="media-upload" accept="image/*" hidden>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button type="button" class="btn-cancel" style="flex:1; background:#333; color:white; border:none; padding:20px; border-radius:8px; font-weight:bold; cursor:pointer;">Annuler</button>
                        <button type="submit" id="publish-btn" class="btn-publish" style="flex:2;">Enregistrer</button>
                    </div>
                </form>
            </section>

            <section id="settings-section" class="hidden">
    <header><h1>Identité & Paramètres</h1></header>
    <form id="settings-form" class="bento-form">
        
        <h3 class="pink-accent">Logos du Site</h3>
        <label>URL Logo Header (Petit)</label>
        <input type="url" id="set-logo-nav" placeholder="Lien du logo menu">
        <label>URL Logo Central (Gros Aigle)</label>
        <input type="url" id="set-logo-hero" placeholder="Lien du logo central">

        <h3 class="pink-accent">Section Fondateur</h3>
        <label>Photo Fondateur (URL)</label>
        <input type="url" id="set-founder-img" placeholder="Lien de la photo">
        <label>Citation</label>
        <input type="text" id="set-founder-quote" placeholder="Ex: Le conseiller aux 3000 numéros">
        <textarea id="set-founder-desc" rows="4" style="width:100%; background:var(--surface); border:1px solid #444; color:white; border-radius:8px; padding:15px;" placeholder="Description du fondateur..."></textarea>

        <h3 class="pink-accent">Statistiques</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="text" id="set-stat1" placeholder="Stat 1">
            <input type="text" id="set-stat4" placeholder="Stat 4">
            <input type="text" id="set-stat2" placeholder="Stat 2">
            <input type="text" id="set-stat3" placeholder="Stat 3">
        </div>
        
        <button type="submit" class="btn-publish">Enregistrer les modifications</button>
    </form>
</section>

        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
