<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USM Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

    <div id="auth-loader" class="fullscreen-loader">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Eagle_white_icon.svg/1024px-Eagle_white_icon.svg.png" alt="USM" width="60" class="pulse-anim">
    </div>

    <div id="login-screen" class="hidden">
        <form id="login-form">
            <h2>USM SYSTEM</h2>
            <input type="email" id="admin-email" placeholder="Email" required>
            <input type="password" id="admin-pwd" placeholder="Mot de passe" required>
            <button type="submit">Connexion</button>
        </form>
    </div>

    <div id="dashboard" class="hidden">
        
        <aside class="sidebar">
            <h2 class="pink-accent">USM Admin</h2>
            <nav>
                <button id="nav-manage" class="active">Gérer le Roster</button>
                <button id="nav-settings">Paramètres du Site</button>
                <div style="margin-top: 50px; display: flex; flex-direction: column; gap: 10px;">
                    <a href="index.html" class="btn-return">🔙 Retour au site</a>
                    <button id="logout-btn" class="danger">Déconnexion</button>
                </div>
            </nav>
        </aside>

        <main class="admin-content">
            
            <section id="manage-players-section">
                <header style="margin-bottom: 25px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                        <h1 style="margin: 0;">Gérer le Roster</h1>
                        <button id="btn-show-add-form" style="background:var(--usm-pink); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; transition:0.3s;">➕ Ajouter un profil</button>
                    </div>
                    
                    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px; background: rgba(255,255,255,0.02); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--surface-border);">
                        <div class="admin-tabs" style="margin:0; gap:8px;">
                            <button class="admin-tab active" data-cat="gardien">Gardiens</button>
                            <button class="admin-tab" data-cat="defenseur">Défenseurs</button>
                            <button class="admin-tab" data-cat="milieu">Milieux</button>
                            <button class="admin-tab" data-cat="attaquant">Attaquants</button>
                            <button class="admin-tab" data-cat="feminine">Féminines</button>
                            <button class="admin-tab" data-cat="coach">Coachs</button>
                        </div>
                        <input type="text" id="search-bar" placeholder="🔍 Rechercher un joueur..." style="padding:10px 20px; border-radius:30px; border:1px solid #444; background:#111; color:#fff; width: 250px;">
                    </div>
                </header>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Ordre</th>
                                <th>Photo</th>
                                <th>Nom</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-players-list"></tbody>
                    </table>
                </div>
                <div id="pagination-controls" style="display:flex; gap:10px; margin-top:20px; justify-content:center;"></div>
            </section>

            <section id="form-player-section" class="hidden">
                <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                    <h1 id="form-title">Créer un Profil</h1>
                    <button class="btn-cancel" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">❌ Annuler</button>
                </header>
                <form id="content-form" class="bento-form">
                    <input type="hidden" id="edit-player-id">
                    <input type="hidden" id="existing-image-url">
                    <input type="text" id="player-name" placeholder="Nom du Joueur" required>
                    <input type="text" id="player-stat" placeholder="Statistique (ex: 150 Sélections)">
                    <input type="url" id="player-tm" placeholder="Lien Transfermarkt (Optionnel)">
                    <select id="player-category">
                        <option value="gardien">Gardien</option>
                        <option value="defenseur">Défenseur</option>
                        <option value="milieu">Milieu</option>
                        <option value="attaquant">Attaquant</option>
                        <option value="feminine">Féminine</option>
                        <option value="coach">Coach & Staff</option>
                    </select>
                    <div id="drop-zone" class="drop-zone">
                        <p>Glissez une photo ici</p>
                        <input type="file" id="media-upload" accept="image/*" hidden>
                    </div>
                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button type="button" class="btn-cancel" style="flex:1; background:#333; color:white; border:none; padding:20px; border-radius:8px; font-weight:bold; cursor:pointer;">Annuler</button>
                        <button type="submit" id="publish-btn" class="btn-publish" style="flex:2;">Enregistrer</button>
                    </div>
                </form>
            </section>

            <section id="settings-section" class="hidden">
                <header><h1>Identité & Paramètres</h1></header>
                <form id="settings-form" class="bento-form">
                    
                    <h3 class="pink-accent">Logos du Site</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div>
                            <label style="color:#aaa; font-size:0.85rem;">Logo Menu (Header)</label>
                            <div id="drop-zone-nav" class="drop-zone" style="padding: 20px; margin-top:5px;">
                                <p style="font-size: 0.9rem;">Glissez le logo</p>
                                <input type="file" id="nav-upload" accept="image/*" hidden>
                            </div>
                            <input type="hidden" id="existing-logo-nav">
                        </div>
                        <div>
                            <label style="color:#aaa; font-size:0.85rem;">Logo Central (Aigle géant)</label>
                            <div id="drop-zone-hero" class="drop-zone" style="padding: 20px; margin-top:5px;">
                                <p style="font-size: 0.9rem;">Glissez le logo</p>
                                <input type="file" id="hero-upload" accept="image/*" hidden>
                            </div>
                            <input type="hidden" id="existing-logo-hero">
                        </div>
                    </div>

                    <h3 class="pink-accent" style="margin-top:20px;">Section Fondateur (Multilingue)</h3>
                    
                    <label style="color:#aaa; font-size:0.85rem;">Photo du Fondateur</label>
                    <div id="drop-zone-founder" class="drop-zone">
                        <p>Glissez la photo du fondateur ici</p>
                        <input type="file" id="founder-upload" accept="image/*" hidden>
                    </div>
                    <input type="hidden" id="existing-founder-img">
                    
                    <div style="display:flex; gap:10px; margin: 20px 0;">
                        <button type="button" class="admin-tab lang-tab active" data-lang="fr">🇫🇷 FR</button>
                        <button type="button" class="admin-tab lang-tab" data-lang="en">🇬🇧 EN</button>
                        <button type="button" class="admin-tab lang-tab" data-lang="es">🇪🇸 ES</button>
                        <button type="button" class="admin-tab lang-tab" data-lang="pt">🇵🇹 PT</button>
                    </div>

                    <div class="lang-content" id="lang-fr">
                        <label style="color:#aaa; font-size:0.85rem;">Citation (FR)</label>
                        <input type="text" id="set-founder-quote-fr" placeholder='Ex: "Le conseiller aux 3000 numéros."'>
                        <label style="color:#aaa; font-size:0.85rem; margin-top:10px; display:block;">Description (FR)</label>
                        <textarea id="set-founder-desc-fr" rows="5" style="width:100%; background:var(--surface); border:1px solid #444; color:white; border-radius:8px; padding:15px;"></textarea>
                    </div>

                    <div class="lang-content hidden" id="lang-en">
                        <label style="color:#aaa; font-size:0.85rem;">Citation (EN)</label>
                        <input type="text" id="set-founder-quote-en" placeholder='Ex: "The advisor with 3000 contacts."'>
                        <label style="color:#aaa; font-size:0.85rem; margin-top:10px; display:block;">Description (EN)</label>
                        <textarea id="set-founder-desc-en" rows="5" style="width:100%; background:var(--surface); border:1px solid #444; color:white; border-radius:8px; padding:15px;"></textarea>
                    </div>

                    <div class="lang-content hidden" id="lang-es">
                        <label style="color:#aaa; font-size:0.85rem;">Citation (ES)</label>
                        <input type="text" id="set-founder-quote-es" placeholder='Ex: "El asesor de los 3.000 contactos."'>
                        <label style="color:#aaa; font-size:0.85rem; margin-top:10px; display:block;">Description (ES)</label>
                        <textarea id="set-founder-desc-es" rows="5" style="width:100%; background:var(--surface); border:1px solid #444; color:white; border-radius:8px; padding:15px;"></textarea>
                    </div>

                    <div class="lang-content hidden" id="lang-pt">
                        <label style="color:#aaa; font-size:0.85rem;">Citation (PT)</label>
                        <input type="text" id="set-founder-quote-pt" placeholder='Ex: "O conselheiro de 3.000 contatos."'>
                        <label style="color:#aaa; font-size:0.85rem; margin-top:10px; display:block;">Description (PT)</label>
                        <textarea id="set-founder-desc-pt" rows="5" style="width:100%; background:var(--surface); border:1px solid #444; color:white; border-radius:8px; padding:15px;"></textarea>
                    </div>

                    <h3 class="pink-accent" style="margin-top:20px;">Statistiques</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div><label style="color:#aaa; font-size:0.85rem;">Activité & Transactions</label><input type="text" id="set-stat1" style="margin-top:5px;"></div>
                        <div><label style="color:#aaa; font-size:0.85rem;">Réseau Mondial</label><input type="text" id="set-stat4" style="margin-top:5px;"></div>
                        <div><label style="color:#aaa; font-size:0.85rem;">Confiance & Roster</label><input type="text" id="set-stat2" style="margin-top:5px;"></div>
                        <div><label style="color:#aaa; font-size:0.85rem;">Impact Digital (Abonnés)</label><input type="text" id="set-stat3" style="margin-top:5px;"></div>
                    </div>
                    
                    <button type="submit" class="btn-publish" style="margin-top:20px;">Enregistrer les modifications</button>
                </form>
            </section>

        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
