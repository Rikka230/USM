name: Fix contact and Firebase preview console

on:
  push:
    branches:
      - main
    paths:
      - tools/fix-contact-preview.cjs
      - .github/workflows/fix-contact-preview.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply contact preview patch
        run: node tools/fix-contact-preview.cjs

      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "fix: update contact email and preview firebase init"
          git push origin HEAD:main
