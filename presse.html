<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presse | USM Football</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-nav">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="" class="nav-logo-dyn">
                <div>USM F<span>OO</span>TBALL</div>
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html">❮ Retour Accueil</a>
            <a href="contact.html" style="text-decoration: none;">
                <button class="btn-premium">Contact</button>
            </a>
        </nav>
    </header>

    <main>
        <section class="presse-hero">
            <h1 class="pink-accent">Presse & Médias</h1>
            <p style="color: #aaa; font-size: 1.1rem; margin-top: 10px;">L'actualité de l'agence USM Football dans les médias.</p>
        </section>

        <section class="video-slider-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.8rem; text-transform: uppercase;">Passages TV</h2>
                <div class="slider-controls">
                    <button class="slider-btn" id="btn-vid-prev">❮</button>
                    <button class="slider-btn" id="btn-vid-next">❯</button>
                </div>
            </div>
            
            <div class="video-slider" id="presse-video-container">
                <div class="loader-spinner" style="margin: 50px auto;"></div>
            </div>
        </section>

        <section class="video-slider-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.8rem; text-transform: uppercase;">Dernières Vidéos YouTube</h2>
                <div class="slider-controls">
                    <button class="slider-btn" id="btn-yt-prev">❮</button>
                    <button class="slider-btn" id="btn-yt-next">❯</button>
                </div>
            </div>
            
            <div class="video-slider" id="youtube-feed-container">
                <div class="loader-spinner" style="margin: 50px auto;"></div>
            </div>
        </section>

        <section class="video-slider-wrapper" style="margin-bottom: 80px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.8rem; text-transform: uppercase;">Instagram <span style="color:var(--usm-pink)">@usmgroup</span></h2>
            </div>
            
            <div id="instagram-feed" style="width: 100%; min-height: 250px; background: var(--surface); border-radius: 16px; border: 1px solid var(--surface-border); display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px;">
                <p style="color:#aaa; line-height: 1.6;">
                    <em>
                        <script src="https://elfsightcdn.com/platform.js" async></script>
                        <div class="elfsight-app-6e984936-c485-48bb-ba82-37750d9553f4" data-elfsight-app-lazy></div></em>
                </p>
            </div>
        </section>

        <section class="mosaic-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.8rem; text-transform: uppercase;">Articles & Parutions</h2>
                <div class="slider-controls" style="display: flex; align-items: center; gap: 15px;">
                    <button class="slider-btn" id="btn-art-prev">❮</button>
                    <span id="art-page-info" style="color: #aaa; font-weight: bold; font-size: 1.1rem; min-width: 50px; text-align: center;"></span>
                    <button class="slider-btn" id="btn-art-next">❯</button>
                </div>
            </div>
            <div class="mosaic-grid" id="presse-mosaic-container">
                <div class="loader-spinner" style="margin: 50px auto; grid-column: 1 / -1;"></div>
            </div>
        </section>
    </main>

 <div class="lightbox" id="presse-lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <div class="lightbox-container">
            
            <div class="lightbox-left-col">
                <div class="lightbox-media" id="lightbox-media"></div>
                
                <div class="lightbox-slider-wrapper">
                    <button class="lightbox-slider-btn" onclick="document.getElementById('lightbox-mini-slider').scrollBy({left:-200, behavior:'smooth'})">❮</button>
                    <div class="lightbox-mini-slider" id="lightbox-mini-slider"></div>
                    <button class="lightbox-slider-btn" onclick="document.getElementById('lightbox-mini-slider').scrollBy({left:200, behavior:'smooth'})">❯</button>
                </div>
            </div>

            <div class="lightbox-sidebar">
                <h3 id="lightbox-title" style="font-size: 1.5rem; margin-bottom: 15px; line-height: 1.3;"></h3>
                <div style="width: 40px; height: 3px; background: var(--usm-pink); margin-bottom: 20px;"></div>
                <p id="lightbox-desc" style="color: #aaa; line-height: 1.6; font-size: 0.95rem; white-space: pre-line;"></p>
                <div id="lightbox-link-container"></div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
